            <div class="w-24 h-24 bg-gray-800 flex items-center justify-center text-3xl hover:bg-gray-700 cursor-pointer"></div>
            <div class="w-24 h-24 bg-gray-800 flex items-center justify-center text-3xl hover:bg-gray-700 cursor-pointer"></div>

            <div class="w-24 h-24 bg-gray-800 flex items-center justify-center text-3xl hover:bg-gray-700 cursor-pointer"></div>
            <div class="w-24 h-24 bg-gray-800 flex items-center justify-center text-3xl hover:bg-gray-700 cursor-pointer"></div>
            <div class="w-24 h-24 bg-gray-800 flex items-center justify-center text-3xl hover:bg-gray-700 cursor-pointer"></div>
            </div>
        <button class = "bg-red-800 px-4 py-1 rounded hover:bg-red-900">
            Reset the Game
        </button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
